<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | FazendaDaSorte</title>
    <style>
      /* Background */
      body {
        background-color: #1a1c2c;
        background-image: radial-gradient(at 50% 50%, #2a2e45 0%, #1a1c2c 100%);
        margin: 0;
        padding-top: 0px;
        overflow: hidden; /* Prevent scrolling during loading */
      }

      /* Game Canvas styling (Desktop) */
      #unity-canvas {
        display: block;
        margin: 0 auto;
        outline: 8px solid #333;
        border-radius: 4px;
        box-shadow: 0 0 40px rgba(0,0,0,0.8);
        background: url('Build/Web.jpg') center / cover;
      }

      /* Game Title styling */
      .game-title {
        color: rgb(188, 201, 14);
        font-family: sans-serif;
        margin-bottom: 8px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      }

      /* --- Tap to Play Screen Styling --- */
      #tap-to-play-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9); /* Translucent black */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000; /* Ensure it's on top of everything */
        cursor: pointer; /* Visually indicate it's clickable */
      }

      #tap-to-play-screen h1 {
        color: white;
        font-family: sans-serif;
        font-size: 3em;
        margin-bottom: 20px;
      }

      #tap-to-play-screen p {
        color: #ddd;
        font-family: sans-serif;
        font-size: 1.5em;
      }
    </style>
  </head>

  <body style="text-align: center;">

    <h2 class="game-title">Fazenda Da Sorte</h2>

    <div id="unity-container" style="display:none;">
      <canvas id="unity-canvas" width=622 height=700 tabindex="-1" style="width: 622px; height: 700px;"></canvas>
    </div>

    <div id="tap-to-play-screen">
      <h1>Tap to Play!</h1>
      <p>Tap anywhere to enable sound and start the game.</p>
    </div>

    <script src="Build/Web.loader.js"></script>
    <script>
      const tapToPlayScreen = document.getElementById('tap-to-play-screen');
      const unityContainer = document.getElementById('unity-container');
      const canvas = document.querySelector("#unity-canvas");
      let audioContext;

      // This function handles the tap event and starts the game
      function handleGameStart() {
        console.log("Game start triggered by user gesture.");

        // Unhide the game and hide the tap screen
        unityContainer.style.display = "block";
        tapToPlayScreen.style.display = "none";

        // Remove the event listeners to clean up
        tapToPlayScreen.removeEventListener('click', handleGameStart);
        tapToPlayScreen.removeEventListener('touchend', handleGameStart); // Important for mobile

        // --- Audio Unlock Logic ---
        // Ensure AudioContext is defined. Note: webkitAudioContext is critical for iOS WebKit.
        if (!audioContext) {
          if (window.AudioContext || window.webkitAudioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
          } else {
            console.warn("Web Audio API not supported in this browser.");
            startGameInstance(); // No API, cannot unlock, but try to start anyway.
            return;
          }
        }

        // The resume() method is crucial for iOS WebKit.
        // It must be called directly within this user-gesture-triggered handler.
        if (audioContext.state === 'suspended') {
          console.log("AudioContext is suspended. Attempting to resume...");
          audioContext.resume().then(() => {
            console.log('AudioContext Unlocked!');
            startGameInstance(); // Start Unity after successful unlock
          }).catch((err) => {
            console.error('Failed to resume AudioContext:', err);
            startGameInstance(); // Resume failed, but start Unity as a fallback
          });
        } else if (audioContext.state === 'running') {
          console.log('AudioContext is already running.');
          startGameInstance(); // Start Unity immediately
        }
      }

      // This function initializes the Unity instance
      function startGameInstance() {
        // Only attempt to start if it hasn't already begun
        if (typeof createUnityInstance === 'undefined') {
          console.error("Unity Web Loader is not ready.");
          return;
        }

        createUnityInstance(canvas, {
          arguments: [],
          dataUrl: "Build/Web.data",
          frameworkUrl: "Build/Web.framework.js",
          codeUrl: "Build/Web.wasm",
          streamingAssetsUrl: "StreamingAssets",
          companyName: "WillSoft",
          productName: "FazendaDaSorte",
          productVersion: "1.0",
        }).then((instance) => {
          console.log("Unity Instance Created.");
        }).catch((message) => {
          alert(message);
        });
      }

      // Add the event listeners to the tap screen. 
      // Click handles both desktop clicks and mobile taps (taps act as clicks).
      // Touchend ensures maximum compatibility with iOS WebKit.
      tapToPlayScreen.addEventListener('click', handleGameStart);
      tapToPlayScreen.addEventListener('touchend', handleGameStart); // Best practice for mobile

      // Mobile check (remains same)
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";
        canvas.style.outline = "none";
        document.body.style.textAlign = "left";
        document.body.style.paddingTop = "0";
      }
    </script>
  </body>
</html>
