<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | FazendaDaSorte</title>
    <style>
      /* Apply a nice background to the whole page */
      body {
        background-color: #1a1c2c; /* Deep dark blue/purple */
        background-image: 
          radial-gradient(at 50% 50%, #2a2e45 0%, #1a1c2c 100%);
        margin: 0;
        padding-top: 0px; /* Space from the top */
        overflow-x: hidden;
      }

      /* Use 'outline' instead of 'border' because outline does not add to the width/height */
      #unity-canvas {
        display: block;
        margin: 0 auto; /* Centers the canvas horizontally */
        outline: 8px solid #333; /* The Frame */
        border-radius: 4px;
        box-shadow: 0 0 40px rgba(0,0,0,0.8); /* Depth shadow */
        background: url('Build/Web.jpg') center / cover;
      }

      /* Optional: A simple title above the game */
      .game-title {
        color: rgb(188, 201, 14);
        font-family: sans-serif;
        margin-bottom: 8px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      }
    </style>
  </head>

  <body style="text-align: center;">

    <h2 class="game-title">Fazenda Do Sortudo</h2>

    <canvas id="unity-canvas" width=622 height=700 tabindex="-1" style="width: 622px; height: 700px;"></canvas>

    <script src="Build/Web.loader.js"></script>
    <script>
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";
        canvas.style.outline = "none"; /* Remove frame on mobile to save space */

        document.body.style.textAlign = "left";
        document.body.style.paddingTop = "0";
      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/Web.data",
        frameworkUrl: "Build/Web.framework.js",
        codeUrl: "Build/Web.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "WillSoft",
        productName: "FazendaDaSorte",
        productVersion: "1.0",
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
