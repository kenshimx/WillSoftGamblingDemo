<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | FazendaDaSorte</title>
    <style>
      /* Apply a nice background to the whole page */
      body {
        background-color: #1a1c2c; /* Deep dark blue/purple */
        background-image: 
          radial-gradient(at 50% 50%, #2a2e45 0%, #1a1c2c 100%);
        margin: 0;
        padding-top: 0px; /* Space from the top */
        overflow-x: hidden;
      }

      /* Use 'outline' instead of 'border' because outline does not add to the width/height */
      #unity-canvas {
        display: block;
        margin: 0 auto; /* Centers the canvas horizontally */
        outline: 8px solid #333; /* The Frame */
        border-radius: 4px;
        box-shadow: 0 0 40px rgba(0,0,0,0.8); /* Depth shadow */
        background: url('Build/Web.jpg') center / cover;
      }

      /* Optional: A simple title above the game */
      .game-title {
        color: rgb(188, 201, 14);
        font-family: sans-serif;
        margin-bottom: 8px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      }
    </style>
  </head>

  <body style="text-align: center;">

    <h2 class="game-title">Fazenda Da Sorte</h2>

    <canvas id="unity-canvas" width=622 height=700 tabindex="-1" style="width: 622px; height: 700px;"></canvas>

    <script src="Build/Web.loader.js"></script>
    <script>
      /* --- START OF AUDIO UNLOCK CODE --- */
      // This section must run BEFORE the Unity Instance is created.

      let unityInstanceVar; // Variable to store the Unity instance
      let audioContext;

      // Function to attempt to unlock audio
      function unlockAudio() {
        console.log("Interaction detected. Attempting to unlock audio...");

        if (!audioContext) {
          // Check if AudioContext is available (Web Audio API)
          if (window.AudioContext || window.webkitAudioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
          } else {
            console.warn("Web Audio API not supported in this browser.");
            removeUnlockListeners(); // API missing, can't unlock.
            return; 
          }
        }

        // If the context is 'suspended', try to resume it.
        // This 'resume()' must be triggered by a user gesture on iOS.
        if (audioContext.state === 'suspended') {
          audioContext.resume().then(() => {
            console.log('AudioContext Unlocked via User Gesture!');
            // Once unlocked, sounds should play automatically.
            
            // Critical Step: After unlocking, you must tell the existing Unity 
            // instance to refresh its own audio system.
            if (unityInstanceVar) {
              console.log("Refreshing Unity sound system...");
              unityInstanceVar.SendMessage("InternalWebRequest", "RefreshAudioContext"); // Common Unity method
            } else {
              // We don't have the Unity instance yet. Wait for it to be created.
              // When it is created, its standard internal initialization should
              // find the already-unlocked AudioContext.
            }

            removeUnlockListeners(); // Unlock successful, clean up listeners.
          }).catch((err) => {
            console.error('Failed to resume AudioContext:', err);
          });
        } else if (audioContext.state === 'running') {
            console.log('AudioContext is already running. Cleaning up listeners.');
            removeUnlockListeners();
        }
      }

      function removeUnlockListeners() {
        // Only one interaction is needed to unlock. Clean up to improve performance.
        window.removeEventListener('click', unlockAudio);
        window.removeEventListener('touchstart', unlockAudio);
        window.removeEventListener('touchend', unlockAudio);
      }

      // Attach the listener to the first interaction (click, touchstart, or touchend)
      // This listener is 'one-off', only the first one to trigger wins.
      window.addEventListener('click', unlockAudio);
      window.addEventListener('touchstart', unlockAudio);
      window.addEventListener('touchend', unlockAudio); // Include touchend for broader iOS support.

      /* --- END OF AUDIO UNLOCK CODE --- */

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";
        canvas.style.outline = "none"; /* Remove frame on mobile to save space */

        document.body.style.textAlign = "left";
        document.body.style.paddingTop = "0";
      }

      // Capture the resulting instance in unityInstanceVar
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/Web.data",
        frameworkUrl: "Build/Web.framework.js",
        codeUrl: "Build/Web.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "WillSoft",
        productName: "FazendaDaSorte",
        productVersion: "1.0",
      }).then((instance) => {
          unityInstanceVar = instance; // Store the instance for potential audio refresh.
          console.log("Unity Instance Created.");
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
